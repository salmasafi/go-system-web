name: systego
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  awesome_snackbar_content: ^0.1.8
  convex_bottom_bar: ^3.2.0
  cupertino_icons: ^1.0.2
  device_preview: ^1.3.1
  dio: ^5.9.0
  dropdown_search: ^5.0.6
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  image_picker: ^1.2.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  shimmer_animation: ^2.2.2
  simple_barcode_scanner: ^0.3.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/Rubik/
  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik/Rubik-Bold.ttf
